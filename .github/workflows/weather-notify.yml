name: weather-forecast-to-slack

on:
  schedule:
    # 08:00 JST
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Post weather forecast
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          WEATHER_NAME: ${{ vars.WEATHER_NAME }}
          WEATHER_TIMEZONE: ${{ vars.WEATHER_TIMEZONE }}
        run: |
          cargo run --release -- \
            --lat "${{ vars.WEATHER_LAT }}" \
            --lon "${{ vars.WEATHER_LON }}" \
            --api-url "${{ vars.WEATHER_API_URL }}" \
            --name "${WEATHER_NAME}" \
            --timezone "${WEATHER_TIMEZONE}"
