name: weather-forecast-to-slack

on:
  schedule:
    # 07:00 JST
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Post weather forecast
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          WEATHER_LAT: ${{ vars.WEATHER_LAT }}
          WEATHER_LON: ${{ vars.WEATHER_LON }}
          WEATHER_NAME: ${{ vars.WEATHER_NAME }}
          WEATHER_API_URL: ${{ vars.WEATHER_API_URL || 'https://api.open-meteo.com/v1/forecast' }}
          WEATHER_TIMEZONE: ${{ vars.WEATHER_TIMEZONE || 'Asia/Tokyo' }}
        run: |
          set -eu

          RUST_ARGS=(
            --lat "$WEATHER_LAT"
            --lon "$WEATHER_LON"
            --api-url "$WEATHER_API_URL"
            --timezone "$WEATHER_TIMEZONE"
          )

          if [ -n "${WEATHER_NAME:-}" ]; then
            RUST_ARGS+=(--name "$WEATHER_NAME")
          fi

          cargo run --release -- "${RUST_ARGS[@]}"
